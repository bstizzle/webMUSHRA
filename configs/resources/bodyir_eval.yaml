testname: Similarity Listening Test

bufferSize: 2048
stopOnErrors: true

pages:

  #
  # INTRO PAGE
  #
  - type: generic
    id: intro
    name: Welcome

    content: |
      # Audio Similarity Test

      In this listening test, you will compare several audio samples
      against a reference sample.

      Your task:
      - Listen to the reference
      - Listen to each processed sample
      - Rate how similar each sample is to the reference

      Rating scale:
      - 100 = Identical to reference
      - 80 = Very similar
      - 60 = Slightly different
      - 40 = Noticeably different
      - 20 = Very different
      - 0 = Completely different

      Please use headphones and complete the test in a quiet environment.

  #
  # TEST 1
  #
  - type: mushra
    id: test1
    name: Test 1

    content: |
      Rate how similar each sample is to the reference sample.

    showWaveform: true
    enableLooping: true
    reference: config/audio/test1/G#3_207_ir_reference.wav

    stimuli:
      Sample A: config/audio/test1/G#3_207_ir_extracted_full.wav
      Sample B: config/audio/test1/G#3_207_ir_extracted_high.wav
      Sample C: config/audio/test1/G#3_207_ir_extracted_sparse.wav

  #
  # TEST 2
  #
  - type: mushra
    id: test2
    name: Test 2

    content: |
      Rate how similar each sample is to the reference sample.

    showWaveform: true
    enableLooping: true
    reference: config/audio/test2/E3_164Hz_ir_reference.wav

    stimuli:
      Sample A: config/audio/test2/E3_164Hz_ir_extracted_full.wav
      Sample B: config/audio/test2/E3_164Hz_ir_extracted_high.wav
      Sample C: config/audio/test2/E3_164Hz_ir_sparse.wav

  #
  # TEST 3
  #
  - type: mushra
    id: test3
    name: Test 3

    content: |
      Rate how similar each sample is to the reference sample.

    showWaveform: true
    enableLooping: true
    reference: config/audio/test3/B4_493Hz_ir_reference.wav

    stimuli:
      Sample A: config/audio/test3/B4_493Hz_ir_extracted_full.wav
      Sample B: config/audio/test3/B4_493Hz_ir_extracted_high.wav
      Sample C: config/audio/test3/B4_493Hz_ir_extracted_sparse.wav

  #
  # FINISH PAGE
  #
  - type: finish
    name: Finished

    content: |
      Thank you for participating in this listening test.